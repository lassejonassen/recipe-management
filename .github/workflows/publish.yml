name: Build and Push Docker Image

on:
  release:
      types: [published]
  push:
    tags:
      - "v*" # Triggers on tags starting with 'v' (e.g., v1.0.0)
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        # Context should be the root of the repo so the Dockerfile
        # can access project dependencies/slnx files if needed.
        context: .
        file: ./src/RecipeManagement.WebAPI/Dockerfile
        push: true
        # github.ref_name contains the tag name (e.g., v1.0.2)
        tags: |
          # ${{ secrets.DOCKERHUB_USERNAME }}/ljt-mes-platform-recipe-management:${{ github.ref_name }}
          ${{ secrets.DOCKERHUB_USERNAME }}/ljt-mes-platform-recipe-management:${{ github.event.release.tag_name }}
          ${{ secrets.DOCKERHUB_USERNAME }}/ljt-mes-platform-recipe-management:latest